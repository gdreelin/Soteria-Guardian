alias: Soteria - Fall Confirmation Lights
description: Pulses white lights while waiting for the resident to respond.
mode: restart
sequence:
  - repeat:
      while:
        - condition: state
          entity_id: input_boolean.soteria_fall_confirmation_pending
          state: "on"
      sequence:
        - action: light.turn_on
          target:
            entity_id: light.soteria_emergency_lights
          data:
            rgb_color: [255, 255, 255]
            brightness_pct: 100
            transition: 0.2

        - delay:
            seconds: 1

        - action: light.turn_on
          target:
            entity_id: light.soteria_emergency_lights
          data:
            rgb_color: [255, 255, 255]
            brightness_pct: 20
            transition: 0.2

        - delay:
            seconds: 1
